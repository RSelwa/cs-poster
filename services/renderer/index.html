<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>cs-poster</title>
    <style>
      :root { color-scheme: dark; }
      body { margin: 0; background: #0b0a0d; color: #eee; font: 14px/1.4 -apple-system, system-ui, sans-serif; }
      .toolbar {
        position: sticky; top: 0; z-index: 100; display: flex; gap: 16px; align-items: center;
        padding: 12px 20px; background: #15131a; border-bottom: 1px solid #2a2730;
      }
      .toolbar button, .toolbar label {
        background: #2a2730; color: #eee; border: 1px solid #3a3744;
        padding: 7px 14px; border-radius: 6px; cursor: pointer; font-size: 13px;
      }
      .layout { display: flex; align-items: flex-start; }
      #panel {
        position: sticky; top: 49px; width: 232px; flex: none;
        max-height: calc(100vh - 49px); overflow-y: auto;
        padding: 16px; background: #131119; border-right: 1px solid #2a2730;
        display: flex; flex-direction: column; gap: 11px;
      }
      #panel .ctl { display: flex; flex-direction: column; gap: 4px; font-size: 12px; color: #9b96a8; }
      #panel .ctl b { color: #fff; font-weight: 600; }
      #panel .ctl:has(input[type="checkbox"]) { flex-direction: row; align-items: center; gap: 8px; }
      #panel input[type="range"] { width: 100%; }
      #panel select { background: #2a2730; color: #eee; border: 1px solid #3a3744; border-radius: 5px; padding: 5px; }
      .stage { flex: 1; padding: 40px; display: flex; justify-content: center; overflow: auto; }

      /* the poster itself — light ground, dark crisp text */
      #canvas-host { position: relative; background: #f4f0e7; box-shadow: 0 20px 80px rgba(0,0,0,0.4); }
      #canvas-host canvas { position: absolute; left: 0; top: 0; z-index: 1; display: block; }
      #canvas-host .overlay { position: absolute; pointer-events: none; z-index: 2; color: #1c1a17; }
      #canvas-host .bg-data {
        position: absolute; inset: 0; z-index: 0; overflow: hidden; padding: 24px;
        font: 10px/1.5 ui-monospace, monospace; color: rgba(28,26,23,0.05);
        word-break: break-all; letter-spacing: 1px; user-select: none;
      }
      .overlay.maptag { font: 600 10px/1 ui-monospace, monospace; letter-spacing: .12em; color: rgba(28,26,23,0.55); }
      .overlay.welllabel { font: 600 9px/1 ui-monospace, monospace; letter-spacing: .1em; color: rgba(28,26,23,0.5); }
      .overlay.scorebox { display: flex; gap: 16px; align-items: stretch; font: 12px/1.35 ui-monospace, monospace; }
      .overlay.scorebox .teams { text-transform: uppercase; letter-spacing: .08em; }
      .overlay.scorebox .teams b { font-size: 14px; margin-left: 8px; }
      .overlay.scorebox .teams span { font-size: 9px; vertical-align: middle; }
      .overlay.scorebox .meta { border: 1px solid #1c1a17; padding: 5px 9px; font-size: 9px; letter-spacing: .08em; align-self: center; text-align: left; }
    </style>
    <script type="importmap">
      {
        "imports": {
          "p5": "https://esm.sh/p5@1.11.0",
          "p5.brush": "https://esm.sh/p5.brush@1.1.0?deps=p5@1.11.0",
          "html2canvas": "https://esm.sh/html2canvas@1.4.1"
        }
      }
    </script>
  </head>
  <body>
    <div class="toolbar">
      <strong>cs-poster</strong>
      <label>load JSON<input id="file" type="file" accept="application/json" hidden /></label>
      <button id="save">Save PNG</button>
      <span style="color:#6f6a7d">default: sample-match.json · append ?data=/data/your.json · tune live →</span>
    </div>
    <div class="layout">
      <div id="panel"></div>
      <div class="stage"><div id="canvas-host"></div></div>
    </div>
    <script type="module" src="/services/renderer/sketch.js"></script>
  </body>
</html>
