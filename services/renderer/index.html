<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>cs-poster</title>
    <style>
      :root { color-scheme: dark; }
      body {
        margin: 0;
        background: #0b0a0d;
        color: #eee;
        font: 14px/1.4 -apple-system, system-ui, sans-serif;
      }
      .toolbar {
        position: sticky; top: 0; z-index: 100;
        display: flex; gap: 16px; align-items: center;
        padding: 12px 20px; background: #15131a; border-bottom: 1px solid #2a2730;
      }
      .toolbar button, .toolbar label {
        background: #2a2730; color: #eee; border: 1px solid #3a3744;
        padding: 7px 14px; border-radius: 6px; cursor: pointer; font-size: 13px;
      }
      .layout { display: flex; align-items: flex-start; }
      /* live parameter panel — the "interface to iterate on the rules" */
      #panel {
        position: sticky; top: 49px; width: 230px; flex: none;
        max-height: calc(100vh - 49px); overflow-y: auto;
        padding: 16px; background: #131119; border-right: 1px solid #2a2730;
        display: flex; flex-direction: column; gap: 12px;
      }
      #panel .ctl { display: flex; flex-direction: column; gap: 4px; font-size: 12px; color: #9b96a8; }
      #panel .ctl b { color: #fff; font-weight: 600; }
      #panel input[type="range"] { width: 100%; }
      #panel select { background: #2a2730; color: #eee; border: 1px solid #3a3744; border-radius: 5px; padding: 5px; }
      .stage { flex: 1; padding: 40px; display: flex; justify-content: center; overflow: auto; }

      #canvas-host { position: relative; background: #0e0d11; box-shadow: 0 20px 80px rgba(0,0,0,0.6); }
      /* explicit stacking: bg texture < canvas < text overlay */
      #canvas-host canvas { position: absolute; left: 0; top: 0; z-index: 1; display: block; }
      #canvas-host .overlay { position: absolute; pointer-events: none; z-index: 2; }
      #canvas-host .bg-data {
        position: absolute; inset: 0; z-index: 0; overflow: hidden;
        padding: 24px; font: 11px/1.5 ui-monospace, monospace;
        color: rgba(255,255,255,0.045); word-break: break-all; letter-spacing: 1px;
        user-select: none;
      }
      .overlay.header { text-align: center; }
      .overlay.header .event { letter-spacing: .18em; text-transform: uppercase; font-size: 13px; color: #9b96a8; }
      .overlay.header .title { font-size: 46px; font-weight: 800; margin: 8px 0; letter-spacing: -.01em; }
      .overlay.header .title .score { color: #fff; margin: 0 18px; font-variant-numeric: tabular-nums; }
      .overlay.header .date { font-size: 12px; color: #6f6a7d; letter-spacing: .1em; }
      .overlay.maplabel {
        display: flex; align-items: baseline; gap: 12px;
        font-size: 15px; letter-spacing: .14em; text-transform: uppercase; color: #c9c4d6;
      }
      .overlay.maplabel .mapname { font-weight: 700; }
      .overlay.maplabel .mapscore { color: #fff; font-variant-numeric: tabular-nums; }
      .overlay.maplabel .tag { font-size: 10px; padding: 2px 6px; border: 1px solid #4a4658; border-radius: 4px; color: #9b96a8; }
      .overlay.maplabel .tag.dec { border-color: #ffd54a; color: #ffd54a; }
    </style>
    <script type="importmap">
      {
        "imports": {
          "p5": "https://esm.sh/p5@1.11.0",
          "p5.brush": "https://esm.sh/p5.brush@1.1.0?deps=p5@1.11.0",
          "html2canvas": "https://esm.sh/html2canvas@1.4.1"
        }
      }
    </script>
  </head>
  <body>
    <div class="toolbar">
      <strong>cs-poster</strong>
      <label>load JSON<input id="file" type="file" accept="application/json" hidden /></label>
      <button id="save">Save PNG</button>
      <span style="color:#6f6a7d">default: sample-match.json · append ?data=/data/your.json · tune live →</span>
    </div>
    <div class="layout">
      <div id="panel"></div>
      <div class="stage"><div id="canvas-host"></div></div>
    </div>
    <script type="module" src="/services/renderer/sketch.js"></script>
  </body>
</html>
